name: Backfill Missing Dates

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      dates:
        description: 'Dates to generate (comma-separated YYYY-MM-DD). Empty = auto-detect missing.'
        required: false
        default: ''
      force:
        description: 'Force regenerate even if file exists? (yes/no)'
        required: false
        default: 'no'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install openai

      - name: Delete files if force regenerating
        if: ${{ github.event.inputs.force == 'yes' && github.event.inputs.dates != '' }}
        run: |
          IFS=',' read -ra DATES <<< "${{ github.event.inputs.dates }}"
          for date in "${DATES[@]}"; do
            date=$(echo $date | tr -d ' ')
            if [ -f "src/data/${date}.js" ]; then
              echo "Deleting src/data/${date}.js for regeneration"
              rm "src/data/${date}.js"
            fi
          done

      - name: Generate dates
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATES: ${{ github.event.inputs.dates }}
          MODE: ${{ github.event.inputs.dates != '' && 'backfill-manual' || 'backfill-auto' }}
        run: node .github/scripts/generate-brief.js

      - name: Commit and push
        run: |
          git config user.name "Curio Brief Bot"
          git config user.email "bot@curio-brief.com"
          git add src/data/ src/App.jsx
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Backfill: $(cat /tmp/generated_date.txt 2>/dev/null || echo 'update')"
          git pull --rebase origin main || true
          git push origin main
