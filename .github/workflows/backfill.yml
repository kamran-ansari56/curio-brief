name: Backfill Missing Dates

on:
  schedule:
    # 3:30 AM UTC = 7:30 AM UAE — runs after daily brief
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      dates:
        description: 'Comma-separated dates (YYYY-MM-DD). Leave empty for auto-detect gaps.'
        required: false
        default: ''
      force:
        description: 'Overwrite existing files (true/false)'
        required: false
        default: 'false'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATES: ${{ github.event.inputs.dates }}
          FORCE: ${{ github.event.inputs.force }}
          MODE: ${{ github.event.inputs.dates && 'backfill-manual' || 'backfill-auto' }}
        run: node .github/scripts/generate-brief.js

      - name: Check if anything was generated
        id: check
        run: |
          RESULT=$(cat /tmp/generated_date.txt 2>/dev/null || echo "no-changes")
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "Result: $RESULT"

      - name: Commit and push
        if: steps.check.outputs.result != 'no-changes'
        run: |
          git config user.name "Curio Brief Bot"
          git config user.email "bot@curio-brief.app"
          git add src/data/ src/App.jsx
          git commit -m "curio: backfill ${{ steps.check.outputs.result }}"
          git pull --rebase origin main
          git push
