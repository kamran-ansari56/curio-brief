name: Daily Brief Generator

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC = 7 AM UAE (GST)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date to generate (YYYY-MM-DD). Leave empty for yesterday (T-1).'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install openai
      - name: Generate brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          MODE: single
        run: node .github/scripts/generate-brief.js
      - name: Commit and push
        run: |
          git config user.name "Curio Brief Bot"
          git config user.email "bot@curio-brief.com"
          git add src/data/ src/App.jsx
          git diff --staged --quiet || git commit -m "Auto-brief: $(cat /tmp/generated_date.txt 2>/dev/null || echo 'update')"
          git push
